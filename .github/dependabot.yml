version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      expo-stack:
        patterns:
          - expo
          - expo-*
          - "@expo/metro-runtime"
          - react-native
          - react-native-*
      test-tooling:
        patterns:
          - vitest
          - typescript
          - "@types/*"
    ignore:
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
