name: Quality

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser smoke runtime
        run: |
          python -m pip install --disable-pip-version-check playwright==1.60.0
          python -m playwright install --with-deps chromium

      - name: Install dependencies
        run: npm ci

      - name: Run local-first release gate
        run: npm run ci

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: movebeta-release-evidence
          if-no-files-found: ignore
          path: |
            docs/sdlc/release-gate-report.json
            docs/sdlc/movenet-readiness-report.json
            docs/sdlc/model-analysis-replay-report.json
            docs/sdlc/model-verification-suite-report.json
            docs/sdlc/native-qa-runbook.json
            docs/sdlc/ios-toolchain-report.json
            docs/sdlc/store-credentials-report.json
            docs/sdlc/cue-validation-dataset-report.json
            docs/sdlc/launch-readiness-report.json
            docs/sdlc/release-blocker-issues-report.json
            docs/store/store-submission-packet.json
