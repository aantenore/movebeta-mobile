name: Deploy Static PWA to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-static-pwa:
    name: Deploy static PWA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release gate
        run: npm run release:check

      - name: Export static PWA
        run: npm run export:web

      - name: Validate static MoveNet assets
        run: npm run model:movenet:assets:check

      - name: Validate model asset provenance
        run: npm run model:assets:provenance

      - name: Validate static PWA
        run: npm run web:pwa:check

      - name: Validate Vercel readiness
        run: npm run web:vercel:check

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build prebuilt Vercel artifact
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt production artifact
        id: deploy
        run: |
          url=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke deployed PWA
        env:
          MOVEBETA_SMOKE_URL: ${{ steps.deploy.outputs.url }}
        run: python3 scripts/smoke_web_video.py

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: movebeta-vercel-deployment-evidence
          if-no-files-found: ignore
          path: |
            docs/sdlc/release-gate-report.json
            docs/sdlc/pwa-readiness-report.json
            docs/sdlc/movenet-static-assets-report.json
            docs/sdlc/model-asset-provenance-report.json
            docs/sdlc/model-asset-attribution.md
            docs/sdlc/vercel-deployment-report.json
            docs/sdlc/release-freshness-report.json
            dist/model-assets.json
            dist/manifest.json
            dist/sw.js
